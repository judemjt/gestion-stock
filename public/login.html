<!DOCTYPE html>

<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - StockPro</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4f46e5, #7c3aed, #06b6d4);
        }

        .login-card {
            width: 420px;
            padding: 40px;
            background: rgba(255, 255, 255, .15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, .2);
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .2);
            animation: fadeIn .6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            font-size: 55px;
            margin-bottom: 15px;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 8px;
            font-size: 30px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, .8);
            margin-bottom: 35px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            z-index: 2;
        }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px; /* espace pour l'icône gauche */
            border: none;
            border-radius: 12px;
            background: white;
            font-size: 15px;
            outline: none;
            transition: .3s;
            z-index: 1;
        }

        input:focus {
            box-shadow: 0 0 0 4px rgba(99, 102, 241, .2);
        }

        .password-toggle {
            right: 15px;
            cursor: pointer;
            z-index: 3;
            position: absolute;
        }

        .login-btn {
            width: 100%;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            cursor: pointer;
            transition: .3s;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, .4);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            opacity: .8;
            font-size: 14px;
        }

        @media (max-width: 500px) {
            .login-card {
                width: 92%;
                padding: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="logo">
            📦
        </div>

        <h1 class="title">
            StockPro
        </h1>

        <p class="subtitle">
            Connectez-vous à votre espace
        </p>

        <div class="input-group">
            <i class="bi bi-envelope-fill"></i>
            <input type="email" id="email" placeholder="Adresse email">
        </div>

        <div class="input-group">
            <i class="bi bi-lock-fill"></i>
            <input type="password" id="password" placeholder="Mot de passe">
            <i class="bi bi-eye password-toggle" onclick="togglePassword()"></i>
        </div>

        <button class="login-btn" onclick="login()">
            <i class="bi bi-box-arrow-in-right"></i>
            Se connecter
        </button>

        <div class="footer">
            © 2026 StockPro ERP
        </div>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById("password");
            pwd.type = pwd.type === "password" ? "text" : "password";
        }
    </script>
<script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
