<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — StockPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
 
<!-- ── TOPBAR MOBILE ──────────────────────── -->
<div class="sp-topbar">
  <a class="sp-topbar-logo" href="dashboard.html">📦 StockPro</a>
  <button class="sp-burger" id="spBurger" aria-label="Menu">
    <i class="bi bi-list"></i>
  </button>
</div>
 
<!-- ── OVERLAY ────────────────────────────── -->
<div class="sp-overlay" id="spOverlay"></div>
 
<!-- ── SIDEBAR ────────────────────────────── -->
<aside class="sp-sidebar" id="spSidebar">
 
  <a class="sp-logo" href="dashboard.html">📦 StockPro</a>
 
  <ul class="sp-nav">
    <li>
      <a href="dashboard.html" class="active">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a href="articles.html">
        <i class="bi bi-box-seam"></i>
        <span>Articles</span>
      </a>
    </li>
    <li>
      <a href="entrepots.html">
        <i class="bi bi-buildings"></i>
        <span>Entrepôts</span>
      </a>
    </li>
    <li>
      <a href="mouvements.html">
        <i class="bi bi-arrow-left-right"></i>
        <span>Mouvements</span>
      </a>
    </li>
  </ul>
 
  <div class="sp-logout">
    <a href="#" onclick="logout()">
      <i class="bi bi-box-arrow-right"></i>
      <span>Déconnexion</span>
    </a>
    <div id="userInfo" class="sp-user mt-2"></div>
  </div>
 
</aside>
 
<!-- ── CONTENU PRINCIPAL ──────────────────── -->
<main class="sp-main">
 
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-0">Dashboard</h2>
      <p class="text-muted mb-0">Gestion intelligente des stocks</p>
    </div>
  </div>
 
  <!-- KPI -->
  <div class="row g-4">
    <div class="col-sm-6 col-lg-4">
      <div class="kpi-card kpi-articles">
        <div>
          <h6 class="mb-1 fw-semibold opacity-75">Articles</h6>
          <h2 id="kpiArticles">0</h2>
        </div>
        <span class="icon">📦</span>
      </div>
    </div>
    <div class="col-sm-6 col-lg-4">
      <div class="kpi-card kpi-entrepots">
        <div>
          <h6 class="mb-1 fw-semibold opacity-75">Entrepôts</h6>
          <h2 id="kpiEntrepots">0</h2>
        </div>
        <span class="icon">🏢</span>
      </div>
    </div>
    <div class="col-sm-6 col-lg-4">
      <div class="kpi-card kpi-alertes">
        <div>
          <h6 class="mb-1 fw-semibold opacity-75">Alertes</h6>
          <h2 id="kpiAlertes">0</h2>
        </div>
        <span class="icon">⚠️</span>
      </div>
    </div>
  </div>
 
  <!-- Alertes critiques -->
  <div class="sp-card mt-4">
    <h5 class="fw-bold mb-3">🚨 Alertes critiques</h5>
    <div id="alertes"></div>
  </div>
 
  <!-- Mouvements récents -->
  <div class="sp-card mt-4">
    <h5 class="fw-bold mb-3">🔁 Mouvements récents</h5>
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-dark">
          <tr>
            <th>Type</th>
            <th>Article</th>
            <th>Source</th>
            <th>Quantité</th>
            <th>Utilisateur</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="mouvements"></tbody>
      </table>
    </div>
  </div>
 
  <!-- Chart -->
  <div class="sp-card mt-4">
    <h5 class="fw-bold mb-3">📊 Répartition des mouvements</h5>
    <canvas id="chart"></canvas>
  </div>
 
</main>
 
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
