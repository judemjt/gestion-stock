<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouvements — StockPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
 
<!-- ── TOPBAR MOBILE ──────────────────────── -->
<div class="sp-topbar">
  <a class="sp-topbar-logo" href="dashboard.html">📦 StockPro</a>
  <button class="sp-burger" id="spBurger" aria-label="Menu">
    <i class="bi bi-list"></i>
  </button>
</div>
 
<!-- ── OVERLAY ────────────────────────────── -->
<div class="sp-overlay" id="spOverlay"></div>
 
<!-- ── SIDEBAR ────────────────────────────── -->
<aside class="sp-sidebar" id="spSidebar">
 
  <a class="sp-logo" href="dashboard.html">📦 StockPro</a>
 
  <ul class="sp-nav">
    <li>
      <a href="dashboard.html">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a href="articles.html">
        <i class="bi bi-box-seam"></i>
        <span>Articles</span>
      </a>
    </li>
    <li>
      <a href="entrepots.html">
        <i class="bi bi-buildings"></i>
        <span>Entrepôts</span>
      </a>
    </li>
    <li>
      <a href="mouvements.html" class="active">
        <i class="bi bi-arrow-left-right"></i>
        <span>Mouvements</span>
      </a>
    </li>
  </ul>
 
  <div class="sp-logout">
    <a href="#" onclick="logout()">
      <i class="bi bi-box-arrow-right"></i>
      <span>Déconnexion</span>
    </a>
  </div>
 
</aside>
 
<!-- ── CONTENU PRINCIPAL ──────────────────── -->
<main class="sp-main">
 
  <div class="mb-4">
    <h2 class="fw-bold mb-0">Mouvements</h2>
    <p class="text-muted mb-0">Entrées, sorties et transferts de stock</p>
  </div>
 
  <!-- FILTRES -->
  <div class="sp-card mb-4">
    <h5 class="fw-bold mb-3">🔎 Filtres</h5>
    <div class="row g-2">
      <div class="col-md-4 col-sm-6">
        <select id="filterType" class="form-select" onchange="filtrerMouvements()">
          <option value="">Tous types</option>
          <option value="ENTREE">Entrée</option>
          <option value="SORTIE">Sortie</option>
          <option value="TRANSFERT">Transfert</option>
        </select>
      </div>
      <div class="col-md-4 col-sm-6">
        <input id="filterArticle" class="form-control" placeholder="Rechercher un article…" oninput="filtrerMouvements()">
      </div>
      <div class="col-md-4">
        <input id="filterEntrepot" class="form-control" placeholder="Entrepôt / client / fournisseur…" oninput="filtrerMouvements()">
      </div>
    </div>
  </div>
 
  <!-- NOUVEAU MOUVEMENT -->
  <div class="sp-card mb-4">
    <h5 class="fw-bold mb-3">🔁 Nouveau mouvement</h5>
    <div class="row g-3">
      <div class="col-md-3 col-sm-6">
        <label class="form-label">Type</label>
        <select id="type" class="form-select" onchange="changerType()">
          <option value="ENTREE">Entrée</option>
          <option value="SORTIE">Sortie</option>
          <option value="TRANSFERT">Transfert</option>
        </select>
      </div>
      <div class="col-md-3 col-sm-6">
        <label class="form-label">Article</label>
        <select id="article" class="form-select"></select>
      </div>
      <div class="col-md-2 col-sm-6">
        <label class="form-label">Quantité</label>
        <input id="quantite" type="number" min="1" step="1" class="form-control" required>
      </div>
    </div>
    <div class="row mt-3" id="zoneDynamique"></div>
    <button class="btn btn-primary mt-3" onclick="executerMouvement()">
      <i class="bi bi-check-lg me-1"></i> Valider le mouvement
    </button>
  </div>
 
  <!-- HISTORIQUE -->
  <div class="sp-card">
    <h5 class="fw-bold mb-3">📜 Historique des mouvements</h5>
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th>Type</th>
            <th>Article</th>
            <th>Quantité</th>
            <th>Utilisateur</th>
            <th>Source</th>
            <th>Destination</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="mouvementsTable">
          <tr>
            <td colspan="7" class="text-center text-muted py-3">Aucun mouvement trouvé</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
 
</main>
 
<script src="js/sidebar.js"></script>
<script src="js/mouvements.js"></script>
</body>
</html>
