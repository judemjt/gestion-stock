<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrepôts — StockPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
 
<!-- ── TOPBAR MOBILE ──────────────────────── -->
<div class="sp-topbar">
  <a class="sp-topbar-logo" href="dashboard.html">📦 StockPro</a>
  <button class="sp-burger" id="spBurger" aria-label="Menu">
    <i class="bi bi-list"></i>
  </button>
</div>
 
<!-- ── OVERLAY ────────────────────────────── -->
<div class="sp-overlay" id="spOverlay"></div>
 
<!-- ── SIDEBAR ────────────────────────────── -->
<aside class="sp-sidebar" id="spSidebar">
 
  <a class="sp-logo" href="dashboard.html">📦 StockPro</a>
 
  <ul class="sp-nav">
    <li>
      <a href="dashboard.html">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a href="articles.html">
        <i class="bi bi-box-seam"></i>
        <span>Articles</span>
      </a>
    </li>
    <li>
      <a href="entrepots.html" class="active">
        <i class="bi bi-buildings"></i>
        <span>Entrepôts</span>
      </a>
    </li>
    <li>
      <a href="mouvements.html">
        <i class="bi bi-arrow-left-right"></i>
        <span>Mouvements</span>
      </a>
    </li>
  </ul>
 
  <div class="sp-logout">
    <a href="#" onclick="logout()">
      <i class="bi bi-box-arrow-right"></i>
      <span>Déconnexion</span>
    </a>
  </div>
 
</aside>
 
<!-- ── CONTENU PRINCIPAL ──────────────────── -->
<main class="sp-main">
 
  <div class="mb-4">
    <h2 class="fw-bold mb-0">Entrepôts</h2>
    <p class="text-muted mb-0">Gérez vos sites de stockage</p>
  </div>
 
  <!-- FORMULAIRE -->
  <div class="sp-card mb-4">
    <h5 class="fw-bold mb-3">➕ Créer un entrepôt</h5>
    <div class="row g-3">
      <div class="col-md-5 col-sm-6">
        <label class="form-label">Nom de l'entrepôt</label>
        <input id="nom" class="form-control" placeholder="Ex: Entrepôt principal" required>
      </div>
      <div class="col-md-5 col-sm-6">
        <label class="form-label">Localisation</label>
        <input id="localisation" class="form-control" placeholder="Ex: Libreville, Owendo…" required>
      </div>
      <div class="col-md-2 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="addEntrepot()">
          <i class="bi bi-plus-lg me-1"></i> Ajouter
        </button>
      </div>
    </div>
  </div>
 
  <!-- LISTE -->
  <div class="sp-card">
    <h5 class="fw-bold mb-3">🏢 Liste des entrepôts</h5>
    <div id="entrepotsList" class="row g-3">
      <div class="text-center text-muted py-4">Chargement…</div>
    </div>
  </div>
 
</main>
 
<script src="js/sidebar.js"></script>
<script src="js/entrepots.js"></script>
</body>
</html>
