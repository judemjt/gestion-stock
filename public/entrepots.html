<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrepôts - Gestion Stock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="dashboard.html">📦 StockApp</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="dashboard.html">📊 Dashboard</a>
            <a class="nav-link" href="articles.html">📦 Articles</a>
            <a class="nav-link active" href="entrepots.html">🏢 Entrepôts</a>
            <a class="nav-link" href="mouvements.html">🔁 Mouvements</a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- CREATE ENTREPOT -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h5 class="mb-3">➕ Créer un entrepôt</h5>

            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Nom de l’entrepôt</label>
                    <input id="nom"
                           class="form-control"
                           placeholder="Ex: Entrepôt principal"
                           required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Localisation</label>
                    <input id="localisation"
                           class="form-control"
                           placeholder="Ex: Libreville, Owendo..."
                           required>
                </div>

                <div class="col-12">
                    <button class="btn btn-primary w-100"
                            onclick="addEntrepot()">
                        ✓ Ajouter l’entrepôt
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- LISTE -->
    <div class="card shadow-sm">

        <div class="card-body">

            <h5 class="mb-3">🏢 Liste des entrepôts</h5>

            <!-- Zone dynamique -->
            <div id="entrepotsList" class="row g-3">
                <div class="text-center text-muted py-4">
                    Chargement des entrepôts...
                </div>
            </div>

        </div>

    </div>

</div>

<!-- LOGIN CHECK -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.replace("login.html");
    }
});
</script>

<script src="js/entrepots.js"></script>

</body>
</html>
