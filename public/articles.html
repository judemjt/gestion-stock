<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles - StockApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">

        <a class="navbar-brand fw-bold" href="dashboard.html">
            📦 StockApp
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="dashboard.html">📊 Dashboard</a>
                <a class="nav-link active" href="articles.html">📦 Articles</a>
                <a class="nav-link" href="entrepots.html">🏢 Entrepôts</a>
                <a class="nav-link" href="mouvements.html">🔁 Mouvements</a>
            </div>

        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- FORM -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">

            <h5 class="mb-3">➕ Ajouter un article</h5>

            <form onsubmit="addArticle(); return false;">

                <div class="row g-3">

                    <div class="col-md-3">
                        <label class="form-label">Nom</label>
                        <input id="nom" class="form-control" placeholder="Ex: Clavier" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label">Référence</label>
                        <input id="reference" class="form-control" placeholder="Ex: CLV-001" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Prix</label>
                        <input id="prix" type="number" min="0" step="0.01" class="form-control" placeholder="0.00" required>
                    </div>

                    <div class="col-md-2">
                        <label class="form-label">Seuil d’alerte</label>
                        <input id="seuilAlerte" type="number" min="0" class="form-control" placeholder="Ex: 5" required>
                    </div>

                    <div class="col-md-2 d-flex align-items-end">
                        <button id="btnAdd"
                                type="submit"
                                class="btn btn-primary w-100">
                            ✓ Ajouter
                        </button>
                    </div>

                </div>

            </form>

        </div>
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm">

        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="mb-0">📦 Liste des articles</h5>
                <span class="badge bg-secondary" id="count">0</span>
            </div>

            <div class="table-responsive">

                <table class="table table-striped table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Nom</th>
                            <th>Référence</th>
                            <th>Prix</th>
                            <th>Seuil</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="articlesTable">
                        <tr>
                            <td colspan="5" class="text-center text-muted py-3">
                                Chargement des articles...
                            </td>
                        </tr>
                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>

<!-- LOGIN CHECK -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.replace("login.html");
    }
});
</script>

<script src="js/articles.js"></script>

</body>
</html>
