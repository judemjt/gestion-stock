<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Articles — StockPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
 
<!-- ── TOPBAR MOBILE ──────────────────────── -->
<div class="sp-topbar">
  <a class="sp-topbar-logo" href="dashboard.html">📦 StockPro</a>
  <button class="sp-burger" id="spBurger" aria-label="Menu">
    <i class="bi bi-list"></i>
  </button>
</div>
 
<!-- ── OVERLAY ────────────────────────────── -->
<div class="sp-overlay" id="spOverlay"></div>
 
<!-- ── SIDEBAR ────────────────────────────── -->
<aside class="sp-sidebar" id="spSidebar">
 
  <a class="sp-logo" href="dashboard.html">📦 StockPro</a>
 
  <ul class="sp-nav">
    <li>
      <a href="dashboard.html">
        <i class="bi bi-speedometer2"></i>
        <span>Dashboard</span>
      </a>
    </li>
    <li>
      <a href="articles.html" class="active">
        <i class="bi bi-box-seam"></i>
        <span>Articles</span>
      </a>
    </li>
    <li>
      <a href="entrepots.html">
        <i class="bi bi-buildings"></i>
        <span>Entrepôts</span>
      </a>
    </li>
    <li>
      <a href="mouvements.html">
        <i class="bi bi-arrow-left-right"></i>
        <span>Mouvements</span>
      </a>
    </li>
  </ul>
 
  <div class="sp-logout">
    <a href="#" onclick="logout()">
      <i class="bi bi-box-arrow-right"></i>
      <span>Déconnexion</span>
    </a>
  </div>
 
</aside>
 
<!-- ── CONTENU PRINCIPAL ──────────────────── -->
<main class="sp-main">
 
  <div class="mb-4">
    <h2 class="fw-bold mb-0">Articles</h2>
    <p class="text-muted mb-0">Gérez votre catalogue de produits</p>
  </div>
 
  <!-- FORMULAIRE -->
  <div class="sp-card mb-4">
    <h5 class="fw-bold mb-3">➕ Ajouter un article</h5>
    <form onsubmit="addArticle(); return false;">
      <div class="row g-3">
        <div class="col-md-3 col-sm-6">
          <label class="form-label">Nom</label>
          <input id="nom" class="form-control" placeholder="Ex: Clavier" required>
        </div>
        <div class="col-md-3 col-sm-6">
          <label class="form-label">Référence</label>
          <input id="reference" class="form-control" placeholder="Ex: CLV-001" required>
        </div>
        <div class="col-md-2 col-sm-6">
          <label class="form-label">Prix</label>
          <input id="prix" type="number" min="0" step="0.01" class="form-control" placeholder="0.00" required>
        </div>
        <div class="col-md-2 col-sm-6">
          <label class="form-label">Seuil d'alerte</label>
          <input id="seuilAlerte" type="number" min="0" class="form-control" placeholder="Ex: 5" required>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button id="btnAdd" type="submit" class="btn btn-primary w-100">
            <i class="bi bi-plus-lg me-1"></i> Ajouter
          </button>
        </div>
      </div>
    </form>
  </div>
 
  <!-- LISTE -->
  <div class="sp-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0">📦 Liste des articles</h5>
      <span class="badge bg-secondary" id="count">0</span>
    </div>
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th>Nom</th>
            <th>Référence</th>
            <th>Prix</th>
            <th>Seuil</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="articlesTable">
          <tr>
            <td colspan="5" class="text-center text-muted py-3">Chargement…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
 
</main>
 
<script src="js/sidebar.js"></script>
<script src="js/articles.js"></script>
</body>
</html>
